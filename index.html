<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>La Pavonería - Prototipo</title>
    <link rel="stylesheet" href="./styles.css?v=demo-20260625-2" />
  </head>
  <body>
    <main class="prototype-shell" aria-label="Prototipo de escritorio">
      <aside class="sidebar" aria-label="Navegación principal">
        <div class="brand">
          <strong>La Pavonería</strong>
          <span>Lonchería</span>
        </div>

        <nav class="nav-group" aria-label="Secciones">
          <button class="nav-item active" type="button" data-view="ordenes-control" aria-label="Órdenes">
            <span class="icon orders-icon"></span>
            <span>Órdenes</span>
          </button>
          <div class="subnav" aria-label="Opciones de órdenes">
            <button class="subnav-item active" type="button" data-view="ordenes-control">
              <span></span>
              <strong>Control de pedidos</strong>
            </button>
            <button class="subnav-item" type="button" data-view="ordenes-historial">
              <span></span>
              <strong>Historial de pedidos</strong>
            </button>
          </div>
          <button class="nav-item" type="button" data-view="platillos" aria-label="Platillos">
            <span class="icon dishes-icon"></span>
            <span>Platillos</span>
          </button>
          <button class="nav-item" type="button" data-view="estadisticas" aria-label="Estadísticas">
            <span class="icon stats-icon"></span>
            <span>Estadísticas</span>
          </button>
        </nav>

        <nav class="nav-footer" aria-label="Cuenta">
          <button class="nav-item quiet" type="button" data-view="ajustes" aria-label="Ajustes">
            <span class="icon settings-icon"></span>
            <span>Ajustes</span>
          </button>
          <button class="nav-item quiet" type="button" data-view="salir" aria-label="Salir">
            <span class="icon logout-icon"></span>
            <span>Salir</span>
          </button>
        </nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <label class="search">
            <span class="search-icon"></span>
            <input id="searchInput" type="search" placeholder="Buscar órdenes..." aria-label="Buscar" />
          </label>
          <div class="topbar-actions" aria-label="Acciones">
            <button class="icon-button bell-icon" type="button" aria-label="Notificaciones"></button>
            <button class="icon-button profile-icon" type="button" aria-label="Perfil"></button>
          </div>
        </header>

        <div class="content" id="content" aria-live="polite"></div>
      </section>
    </main>

    <div class="prototype-controls" aria-label="Controles del prototipo">
      <button id="prevScreen" type="button">Anterior</button>
      <div class="dots" id="screenDots" aria-label="Pantallas"></div>
      <button id="nextScreen" type="button">Siguiente</button>
    </div>

    <script src="./app.js?v=demo-20260625-2"></script>
  </body>
</html>
